# ============================================================================
# Spring Boot WebFlux Reactive Application Configuration
# ============================================================================

# Application name and description
spring.application.name=ReactiveProgramming
application.title=Spring Boot WebFlux Application
application.description=Complete reactive application with MongoDB

# ============================================================================
# SERVER CONFIGURATION
# ============================================================================
server.port=8081
server.servlet.context-path=/
server.http2.enabled=true
server.compression.enabled=true
server.compression.min-response-size=1024

# ============================================================================
# MONGODB CONFIGURATION - REACTIVE DATA ACCESS
# ============================================================================

# Standard MongoDB connection (local development)
# Ensure MongoDB is running: docker run -d -p 27017:27017 --name mongodb mongo:latest
spring.data.mongodb.uri=mongodb://localhost:27017/reactive_db
spring.data.mongodb.auto-index-creation=true
spring.data.mongodb.authentication-database=admin

# Alternatively, use individual properties instead of URI:
# spring.data.mongodb.host=localhost
# spring.data.mongodb.port=27017
# spring.data.mongodb.database=reactive_db
# spring.data.mongodb.username=admin (if authentication enabled)
# spring.data.mongodb.password=password (if authentication enabled)

# MongoDB Reactive specific configuration
spring.mongodb.embedded.version=4.0.28

# ============================================================================
# LOGGING CONFIGURATION
# ============================================================================

# Root logging level
logging.level.root=INFO

# Application and Spring logging
logging.level.com.reactive.programming.practice.reactiveProgramming=DEBUG
logging.level.org.springframework=INFO
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.data.mongodb=DEBUG
logging.level.org.springframework.boot=INFO

# Reactor Netty logging (WebFlux network layer)
logging.level.reactor.netty=INFO
logging.level.reactor.netty.http.server=DEBUG

# Logback configuration
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.file.name=logs/application.log
logging.file.max-size=10MB
logging.file.max-history=10

# ============================================================================
# JACKSON CONFIGURATION (JSON Serialization)
# ============================================================================

# Date/Time formatting
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.serialization.indent-output=true
spring.jackson.default-property-inclusion=non_null
spring.jackson.time-zone=UTC

# ============================================================================
# ACTUATOR CONFIGURATION (Health, Metrics)
# ============================================================================

management.endpoints.web.exposure.include=health,info,metrics,env
management.endpoint.health.show-details=always
management.health.defaults.enabled=true

# ============================================================================
# NETTY CONFIGURATION (WebFlux Transport Layer)
# ============================================================================

# Connection timeout
spring.webflux.netty.connection-timeout=10000ms

# ============================================================================
# ERROR HANDLING CONFIGURATION
# ============================================================================

# Include exception stack trace in error details (development/testing only)
# Set to 'never' in production
server.error.include-stacktrace=on_param
server.error.include-message=always

# ============================================================================
# PROFILES
# ============================================================================

# Active profile (development, staging, production)
spring.profiles.active=dev

# ============================================================================
# DEVELOPMENT NOTES
# ============================================================================

# For MongoDB Atlas (Cloud):
# spring.data.mongodb.uri=mongodb+srv://username:password@cluster.mongodb.net/database_name?retryWrites=true&w=majority

# For Docker MongoDB:
# docker run -d -p 27017:27017 --name mongodb -e MONGO_INITDB_ROOT_USERNAME=admin -e MONGO_INITDB_ROOT_PASSWORD=password mongo:latest

# For Linux/Mac MongoDB setup:
# brew install mongodb-community (macOS)
# brew services start mongodb-community
# sudo systemctl start mongod (Linux)
